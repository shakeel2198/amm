<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Adarsh Masjid Mission — Coming Soon" />
  <title>Coming Soon | Adarsh Masjid Mission</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Floating background circles for decoration -->
  <div class="bg-circles" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Main card -->
  <main class="card" role="main">

    <!-- Logo / emblem -->
    <div class="logo">
      <div class="emblem" role="img" aria-label="Adarsh Masjid Mission emblem">&#9770;</div>
    </div>

    <!-- Brand -->
    <p class="brand">Adarsh Masjid Mission</p>

    <!-- Heading -->
    <h1>We're <span>Coming Soon</span></h1>

    <!-- Divider -->
    <div class="divider" aria-hidden="true"></div>

    <!-- Description -->
    <p class="description">
      Our website is currently under construction. We are working hard to bring
      you an amazing experience. Stay tuned and be the first to know when we
      launch!
    </p>

    <!-- Notify form -->
    <form class="notify-form" onsubmit="handleNotify(event)" novalidate aria-label="Get notified form">
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email address"
        aria-label="Email address"
        required
      />
      <button type="submit">Notify Me</button>
    </form>

    <!-- Social links -->
    <nav class="social" aria-label="Social media links">
      <a href="#" aria-label="Facebook" title="Facebook">
        <!-- Facebook SVG icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
      </a>
      <a href="#" aria-label="Instagram" title="Instagram">
        <!-- Instagram SVG icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="#" aria-label="Twitter / X" title="Twitter / X">
        <!-- X / Twitter SVG icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>
      <a href="#" aria-label="YouTube" title="YouTube">
        <!-- YouTube SVG icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.54C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
          <polygon fill="#1a1a2e" points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>
        </svg>
      </a>
    </nav>

    <!-- Footer note -->
    <p class="footer-note">&copy; 2026 Adarsh Masjid Mission. All rights reserved.</p>

  </main>

  <script>
    function handleNotify(e) {
      e.preventDefault();
      var input = document.getElementById('email');
      if (!input.value || !input.validity.valid) {
        input.focus();
        return;
      }
      var btn = e.target.querySelector('button');
      btn.textContent = 'Thank You!';
      btn.disabled = true;
      input.value = '';
      input.disabled = true;
    }
  </script>

</body>
</html>
